<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32.png' | relative_url }}" />
  <link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/favicon-180.png' | relative_url }}" />
  <script>
    // Default to dark mode; honor a previously saved choice. Runs before paint to avoid a flash.
    (function () {
      var saved = localStorage.getItem("theme");
      document.documentElement.setAttribute("data-theme", saved || "dark");
    })();
  </script>
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}" />
  {%- feed_meta -%}
</head>
<body>
  <main class="wrap">
    <header class="masthead">
      <a class="logo-link" href="{{ '/' | relative_url }}">
        <img class="logo logo-light" src="{{ '/assets/logo-light.png' | relative_url }}" alt="notesbyjosh — Data · Fabric · AI" width="120" height="120" />
        <img class="logo logo-dark" src="{{ '/assets/logo-dark.png' | relative_url }}" alt="notesbyjosh — Data · Fabric · AI" width="120" height="120" />
      </a>
      <h1 class="visually-hidden"><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
      <p class="tagline">{{ site.description }}</p>
      <div class="controls">
        <input id="search" type="search" placeholder="Search learnings…" aria-label="Search learnings" autocomplete="off" />
        <button id="theme-toggle" type="button" aria-label="Toggle dark mode" title="Toggle theme">◐</button>
      </div>
      <nav class="tagbar" aria-label="Filter by tag">
        <button class="tag-chip active" data-tag="">All</button>
        {%- assign tags = site.tags | sort -%}
        {%- for tag in tags %}
        <button class="tag-chip" data-tag="{{ tag[0] | downcase }}">#{{ tag[0] }}</button>
        {%- endfor %}
      </nav>
    </header>

    {{ content }}

    <footer class="footer">
      <span id="count"></span>
      <span class="sep">·</span>
      <span>Built with Jekyll · hosted on GitHub Pages</span>
    </footer>
  </main>

  <script src="{{ '/assets/app.js' | relative_url }}"></script>
</body>
</html>
